name: 'Setup pnpm'
description: 'Composite action to setup node, pnpm, caching, and private registry access in pnpm repositories'
inputs:
  npm-token:
    required: true
    description: The npm token used to grant registry access. Pass a token with publish permissions if needed.
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f #v6.1.0
      with:
        node-version-file: .nvmrc
    - name: Install pnpm
      uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda #v4.1.0
    - name: Allow read access to private registry
      shell: bash
      run: echo "//registry.npmjs.org/:_authToken=${{ inputs.npm-token }}" > ~/.npmrc
    - name: Restore pnpm store and node_modules
      uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb #v5.0.1
      with:
        save-always: true
        path: |
          .pnpm-store
          **/node_modules
        key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-
author: 'ExodusMovement'
branding:
  icon: 'activity'
  color: 'gray-dark'
